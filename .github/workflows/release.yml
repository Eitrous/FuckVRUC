name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run compile

      - name: Build Chromium extension package
        run: pnpm run zip

      - name: Build Firefox extension package
        run: pnpm run zip:firefox

      - name: Import GPG signing key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          install -m 700 -d "$HOME/.gnupg"
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Sign extension packages
        shell: bash
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          shopt -s nullglob

          packages=(
            .output/*-chrome.zip
            .output/*-firefox.zip
          )

          if (( ${#packages[@]} == 0 )); then
            echo "No packages found to sign."
            exit 1
          fi

          for package in "${packages[@]}"; do
            printf '%s' "$GPG_PASSPHRASE" | 
              gpg \
                --batch \
                --yes \
                --no-tty \
                --pinentry-mode loopback \
                --passphrase-fd 0 \
                --detach-sign \
                --armor \
                "$package"
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            .output/*-chrome.zip
            .output/*-chrome.zip.asc
            .output/*-firefox.zip
            .output/*-firefox.zip.asc
